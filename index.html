<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>akk1TV</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0f0f0f;
      color: #e0e0e0;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 300;
      letter-spacing: 0.1em;
      color: #ffffff;
      margin-bottom: 3rem;
    }

    .links {
      display: flex;
      gap: 1.5rem;
    }

    a {
      display: block;
      padding: 1.2rem 2.5rem;
      background: #1a1a1a;
      color: #c9c9c9;
      text-decoration: none;
      font-size: 1.1rem;
      letter-spacing: 0.05em;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }

    a:hover {
      background: #252525;
      color: #ffffff;
      border-color: #444;
    }
  </style>
</head>
